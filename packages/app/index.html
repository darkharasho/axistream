<!doctype html>
<html><head><meta charset="utf-8" /><title>AxiStream</title>
<!-- media-src blob: — the audio-test player plays clips via Blob URLs; without it CSP silently rejects the load (player stuck at 0:00). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; media-src 'self' blob:" />
</head><body><div id="root"></div><script type="module" src="/src/renderer/main.tsx"></script></body></html>
