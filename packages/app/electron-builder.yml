appId: link.axi.axistream
# Draft-then-promote (axiroster pattern): electron-builder --publish always
# uploads assets + latest-linux.yml (the electron-updater feed) to a DRAFT
# release; the workflow flips draft=false once, atomically.
publish:
  provider: github
  owner: darkharasho
  repo: axistream
  releaseType: draft
productName: AxiStream
# npm workspaces hoist electron to the repo-root node_modules, where
# electron-builder can't discover it — pin the version explicitly.
electronVersion: 31.7.7
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - build/icon.png
asar: true
npmRebuild: false            # everything is bundled by electron-vite; no native deps
electronLanguages: [en-US]
# Windows + macOS builds are CI-wired (release.yml matrix) but runtime is
# still experimental — WindowsObsLauncher is untested on real hardware and
# there is no mac OBS launcher yet. The artifacts install and auto-update.
win:
  target: [nsis]
  icon: build/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}
mac:
  # zip is required alongside dmg — electron-updater's mac feed updates
  # from the zip. Signed with the Developer ID Application cert (CSC_LINK/
  # CSC_KEY_PASSWORD env) and notarized via the APPLE_ID/
  # APPLE_APP_SPECIFIC_PASSWORD env pair.
  target: [dmg, zip]
  icon: build/icon.png
  category: public.app-category.video
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize:
    teamId: YMPSC6RQ4F
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target: [AppImage, deb]
  executableName: axistream
  artifactName: ${productName}-${version}-${arch}.${ext}
  category: AudioVideo
  icon: build/icon.png
  synopsis: Get live on YouTube in three clicks
  maintainer: AxiStream <project96@gmail.com>
