name: Release

# Tag a release: git tag v0.1.0 && git push origin v0.1.0
# Gated on the test job; builds Linux (AppImage + deb), Windows (NSIS,
# unsigned) and macOS (dmg + zip, Developer ID signed + notarized), all
# uploaded to one draft release with their electron-updater feeds
# (latest-linux.yml / latest.yml / latest-mac.yml), then promoted once.
# Mac signing secrets came from 1Password via `gh secret set` (CSC_LINK =
# base64 of the Developer ID Application .p12) — axiroster pattern.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Typecheck
        run: npx tsc --noEmit -p packages/app/tsconfig.json

  # Linux + Windows need no code-signing.
  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Install Linux OBS build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Prepare owned Windows OBS runtime
        if: runner.os == 'Windows'
        run: npm run prepare:obs-runtime -- --platform=windows
      - name: Prepare owned Linux OBS runtime
        if: runner.os == 'Linux'
        run: npm run prepare:obs-runtime -- --platform=linux
      - name: Sync package version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version -w @axistream/app
          echo "Building AxiStream $VERSION for ${{ matrix.os }}"
      - name: Build + upload to draft release
        # --publish always also uploads the per-platform electron-updater feed.
        # npm run -w changes CWD to the workspace — electron-builder's config and
        # project-dir resolution both need to run from packages/app.
        run: npm -w @axistream/app run dist:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Baked into the main bundle at build time (electron.vite.config.ts define).
          AXI_YT_CLIENT_ID: ${{ secrets.AXI_YT_CLIENT_ID }}
          AXI_YT_CLIENT_SECRET: ${{ secrets.AXI_YT_CLIENT_SECRET }}
      - name: Preserve OBS corresponding source and recipe
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: obs-corresponding-source
          path: |
            resources/obs-runtime/notices/obs-studio-32.1.2-axistream-corresponding-source.tar.xz
            packaging/flatpak/link.axi.AxiStream.OBS.json
          if-no-files-found: error

  # macOS is signed + notarized with the Developer ID Application cert;
  # electron-builder reads the CSC_*/APPLE_* values from the environment.
  build-mac:
    needs: [test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Sync package version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version -w @axistream/app
          echo "Building AxiStream $VERSION for macOS"
      - name: Build, sign & upload to draft release
        run: npm -w @axistream/app run dist:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Baked into the main bundle at build time (electron.vite.config.ts define).
          AXI_YT_CLIENT_ID: ${{ secrets.AXI_YT_CLIENT_ID }}
          AXI_YT_CLIENT_SECRET: ${{ secrets.AXI_YT_CLIENT_SECRET }}

  publish:
    needs: [build, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: obs-corresponding-source
          path: obs-corresponding-source
      - name: Upload OBS source compliance assets
        # The artifact preserves each file's repo-relative dir (resources/...,
        # packaging/...), so a shallow glob would hand gh a directory. Upload
        # the leaf files instead.
        run: find obs-corresponding-source -type f -exec gh release upload "$GITHUB_REF_NAME" {} --clobber +
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish the release
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
