name: Release

# Tag a release: git tag v0.1.0 && git push origin v0.1.0
# Builds the Linux AppImage + deb and attaches them to a GitHub Release —
# GearLever-installable straight from the releases page.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit -p packages/app/tsconfig.json

      - name: Sync package version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version -w @axistream/app
          echo "Building AxiStream $VERSION"

      - name: Build + upload to draft release
        # --publish always also uploads latest-linux.yml, the electron-updater feed.
        # npm run -w changes CWD to the workspace — electron-builder's config and
        # project-dir resolution both need to run from packages/app.
        run: npm -w @axistream/app run dist:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Publish the release
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
