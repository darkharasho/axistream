name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Typecheck
        run: npx tsc --noEmit -p packages/app/tsconfig.json
      - name: Build
        run: npm run build

  # Windows runtime smoke: proves WindowsObsLauncher -> obs-websocket ->
  # provisioning reaches a ready phase on real Windows. No GPU/audio-device
  # assertions (runner hardware) — fail-soft paths count as success.
  smoke-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install OBS Studio
        run: choco install obs-studio -y --no-progress
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run smoke boot (with live sampler)
        shell: pwsh
        timeout-minutes: 10
        run: |
          $sampler = Start-Job -ScriptBlock {
            for ($i = 0; $i -lt 40; $i++) {
              $t = Get-Date -Format HH:mm:ss
              $obs = Get-Process obs64 -ErrorAction SilentlyContinue
              $ports = if ($obs) { Get-NetTCPConnection -State Listen -OwningProcess $obs.Id -ErrorAction SilentlyContinue | ForEach-Object { "$($_.LocalAddress):$($_.LocalPort)" } }
              "$t obs=$($obs -ne $null) title='$($obs.MainWindowTitle)' listen=[$($ports -join ',')]" | Out-File -Append $env:GITHUB_WORKSPACE\sampler.log
              Start-Sleep -Seconds 3
            }
          }
          npx electron packages/app --smoke
          $code = $LASTEXITCODE
          Stop-Job $sampler; Remove-Job $sampler -Force
          Write-Host "=== sampler ==="
          Get-Content $env:GITHUB_WORKSPACE\sampler.log -ErrorAction SilentlyContinue
          exit $code
      - name: Upload OBS logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: obs-logs
          path: |
            ~/AppData/Roaming/obs-studio/logs/
            ~/AppData/Roaming/@axistream/
          if-no-files-found: ignore
